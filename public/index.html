<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoLab - 照片处理工具</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d4ff;
    }
    .upload-section {
      background: #16213e;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .drop-zone {
      border: 2px dashed #00d4ff;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: background 0.3s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      background: rgba(0, 212, 255, 0.1);
    }
    .drop-zone input {
      display: none;
    }
    .preview-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .preview-box {
      flex: 1;
      min-width: 280px;
      background: #0f0f23;
      border-radius: 8px;
      padding: 15px;
    }
    .preview-box img {
      width: 100%;
      border-radius: 4px;
    }
    .preview-box h3 {
      margin-bottom: 10px;
      color: #00d4ff;
    }
    .exif-info {
      font-size: 12px;
      line-height: 1.6;
    }
    .exif-info dt {
      color: #888;
      float: left;
      width: 100px;
    }
    .exif-info dd {
      margin-left: 100px;
      color: #00d4ff;
    }
    .options-section {
      background: #16213e;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .option-group {
      margin-bottom: 20px;
    }
    .option-group h3 {
      color: #00d4ff;
      margin-bottom: 15px;
    }
    .option-row {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .option-row label {
      min-width: 80px;
    }
    .option-row input, .option-row select {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 12px;
      color: #fff;
      font-size: 14px;
    }
    .option-row input[type="text"], .option-row input[type="number"] {
      width: 150px;
    }
    .btn {
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #00a8cc;
    }
    .btn:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .result-section {
      background: #16213e;
      border-radius: 12px;
      padding: 30px;
      display: none;
    }
    .result-section.show {
      display: block;
    }
    .color-preview {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      display: inline-block;
      vertical-align: middle;
      margin-left: 10px;
      border: 2px solid #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PhotoLab</h1>

    <div class="upload-section">
      <div class="drop-zone" id="dropZone">
        <p>拖拽照片到这里，或点击选择文件</p>
        <input type="file" id="fileInput" accept="image/*">
      </div>

      <div class="preview-container" id="previewContainer" style="display: none;">
        <div class="preview-box">
          <h3>原图</h3>
          <img id="originalPreview" src="" alt="Original">
        </div>
        <div class="preview-box">
          <h3>处理后</h3>
          <img id="processedPreview" src="" alt="Processed">
        </div>
      </div>
    </div>

    <div class="options-section">
      <div class="option-group">
        <h3>水印设置</h3>
        <div class="option-row">
          <label>水印文字</label>
          <input type="text" id="watermarkText" placeholder="输入水印文字">
        </div>
        <div class="option-row">
          <label>位置</label>
          <select id="watermarkPosition">
            <option value="bottom-right">右下角</option>
            <option value="bottom-left">左下角</option>
            <option value="top-right">右上角</option>
            <option value="top-left">左上角</option>
            <option value="center">居中</option>
          </select>
        </div>
        <div class="option-row">
          <label>字体大小</label>
          <input type="number" id="watermarkFontSize" value="24" min="12" max="72">
        </div>
        <div class="option-row">
          <label>颜色</label>
          <input type="color" id="watermarkColor" value="#ffffff">
        </div>
        <div class="option-row">
          <label>透明度</label>
          <input type="range" id="watermarkOpacity" value="80" min="10" max="100">
          <span id="opacityValue">80%</span>
        </div>
      </div>

      <div class="option-group">
        <h3>边框设置</h3>
        <div class="option-row">
          <label>边框类型</label>
          <select id="borderType">
            <option value="color-bar">纯色边框</option>
            <option value="blur">模糊边框</option>
          </select>
        </div>
        <div class="option-row" id="colorBarOptions">
          <label>边框颜色</label>
          <input type="color" id="borderColor" value="#1a1a1a">
          <label style="margin-left: 20px;">
            <input type="checkbox" id="useDominantColor"> 使用主色调
          </label>
        </div>
        <div class="option-row">
          <label>边框宽度</label>
          <input type="number" id="borderWidth" value="60" min="20" max="200">
        </div>
        <div class="option-row" id="blurOptions" style="display: none;">
          <label>模糊程度</label>
          <input type="range" id="blurRadius" value="20" min="5" max="50">
          <span id="blurValue">20</span>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn" id="processBtn">处理照片</button>
        <button class="btn" id="downloadBtn" style="display: none;">下载结果</button>
      </div>
    </div>

    <div class="result-section" id="resultSection">
      <h3>拍摄设备信息</h3>
      <dl class="exif-info" id="exifInfo"></dl>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const originalPreview = document.getElementById('originalPreview');
    const processedPreview = document.getElementById('processedPreview');
    const resultSection = document.getElementById('resultSection');
    const exifInfo = document.getElementById('exifInfo');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    let uploadedFile = null;
    let processedUrl = null;

    // Drag and drop
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        handleFile(e.dataTransfer.files[0]);
      }
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    // Opacity slider
    document.getElementById('watermarkOpacity').addEventListener('input', (e) => {
      document.getElementById('opacityValue').textContent = e.target.value + '%';
    });

    // Blur slider
    document.getElementById('blurRadius').addEventListener('input', (e) => {
      document.getElementById('blurValue').textContent = e.target.value;
    });

    // Border type toggle
    document.getElementById('borderType').addEventListener('change', (e) => {
      const colorBarOptions = document.getElementById('colorBarOptions');
      const blurOptions = document.getElementById('blurOptions');
      if (e.target.value === 'color-bar') {
        colorBarOptions.style.display = 'flex';
        blurOptions.style.display = 'none';
      } else {
        colorBarOptions.style.display = 'none';
        blurOptions.style.display = 'flex';
      }
    });

    async function handleFile(file) {
      uploadedFile = file;
      const formData = new FormData();
      formData.append('image', file);

      const res = await fetch('/api/photo/upload', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.success) {
        originalPreview.src = data.filePath;
        previewContainer.style.display = 'flex';
        resultSection.classList.add('show');
        displayExif(data.exif);
        processedUrl = null;
        processedPreview.src = '';
        downloadBtn.style.display = 'none';
      }
    }

    function displayExif(exif) {
      let html = '';
      if (exif?.camera) {
        html += `<dt>相机</dt><dd>${exif.camera.make || ''} ${exif.camera.model || ''}</dd>`;
        if (exif.camera.lens) {
          html += `<dt>镜头</dt><dd>${exif.camera.lens}</dd>`;
        }
      }
      if (exif?.settings) {
        const s = exif.settings;
        const parts = [];
        if (s.iso) parts.push(`ISO ${s.iso}`);
        if (s.aperture) parts.push(`f/${s.aperture}`);
        if (s.shutterSpeed) parts.push(`${s.shutterSpeed}`);
        if (s.focalLength) parts.push(`${s.focalLength}mm`);
        if (parts.length) {
          html += `<dt>参数</dt><dd>${parts.join(' ')}</dd>`;
        }
        if (s.flash !== undefined) {
          html += `<dt>闪光灯</dt><dd>${s.flash ? '开启' : '关闭'}</dd>`;
        }
      }
      if (exif?.timestamp) {
        html += `<dt>拍摄时间</dt><dd>${new Date(exif.timestamp).toLocaleString()}</dd>`;
      }
      if (exif?.gps?.latitude && exif?.gps?.longitude) {
        html += `<dt>GPS</dt><dd>${exif.gps.latitude.toFixed(4)}, ${exif.gps.longitude.toFixed(4)}</dd>`;
      }
      html += `<dt>尺寸</dt><dd>${exif?.imageWidth || '?'} × ${exif?.imageHeight || '?'}</dd>`;
      exifInfo.innerHTML = html;
    }

    processBtn.addEventListener('click', async () => {
      if (!uploadedFile) return;

      processBtn.disabled = true;
      processBtn.textContent = '处理中...';

      const formData = new FormData();
      formData.append('image', uploadedFile);

      const watermark = {
        text: document.getElementById('watermarkText').value || 'PhotoLab',
        position: document.getElementById('watermarkPosition').value,
        fontSize: parseInt(document.getElementById('watermarkFontSize').value),
        color: document.getElementById('watermarkColor').value,
        opacity: parseInt(document.getElementById('watermarkOpacity').value) / 100
      };

      const border = {
        type: document.getElementById('borderType').value,
        color: document.getElementById('borderColor').value,
        barWidth: parseInt(document.getElementById('borderWidth').value),
        dominantColor: document.getElementById('useDominantColor').checked,
        blurRadius: parseInt(document.getElementById('blurRadius').value)
      };

      formData.append('watermark', JSON.stringify(watermark));
      formData.append('border', JSON.stringify(border));

      try {
        const res = await fetch('/api/photo/process', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) {
          processedPreview.src = data.outputPath;
          processedUrl = data.outputPath;
          downloadBtn.style.display = 'inline-block';
          displayExif(data.exif);
        } else {
          alert('处理失败: ' + data.error);
        }
      } catch (err) {
        alert('处理失败: ' + err.message);
      } finally {
        processBtn.disabled = false;
        processBtn.textContent = '处理照片';
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (processedUrl) {
        const a = document.createElement('a');
        a.href = processedUrl;
        a.download = 'photolab_' + Date.now() + '.jpg';
        a.click();
      }
    });
  </script>
</body>
</html>
